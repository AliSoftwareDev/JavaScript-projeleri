<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CountDown Timer</title>
</head>
<body>
    <div class="container">
        <div class="counter-back">
            <p>Geri Sayim Sayaci</p>
            <span class="watch">Burada Gösterilecek</span>
            <input type="number" id="count" placeholder="Sayı giriniz">
            <button id="btn-counter">Start</button>
            <button id="btn-pause">Stop</button>

        </div>
    </div>





    <script src="counter.js"></script>
</body>
</html>
