<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Taş-Kağıt-Makas</title>
</head>
<body>
    <p id="computer-choice">Bilgisayar Seçimi</p>
    <div class="container">
        <button class="game-btn" id="stone-btn">Taş
            <img src="images/images.jpg" alt="tas">
        </button>
        <button class="game-btn" id="paper-btn">Kağıt
            <img src="images/62e133404e3fe11214814c11.webp" alt="kağıt">
        </button>
        <button class="game-btn" id="scissors-btn">Makas
            <img src="images/makas.jpg" alt="makas">
        </button>
    </div>

    <div class="result">
        <p id="result-text">Gösteri Yeri</p>
    </div>





    <script src="script.js"></script>
</body>
</html>
